<!DOCTYPE html>
<html lang="en">
  <head>
    <link rel="manifest" href="/manifest.json">
<meta name="theme-color" content="#130d03">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black">
<meta name="apple-mobile-web-app-title" content="Training OS">
<link rel="apple-touch-icon" href="/logo192.png">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;500;700;800&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet">

    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Fagundo Training OS</title>
    <style>
      * { -webkit-tap-highlight-color: transparent; }
      body {
        margin: 0;
        min-height: 100vh;
        font-family: 'Syne',-apple-system,BlinkMacSystemFont,sans-serif;
        color: rgba(255,220,180,0.95);
        background:
          radial-gradient(ellipse 70% 50% at 15% 85%, rgba(255,100,20,0.4) 0%, transparent 55%),
          radial-gradient(ellipse 50% 60% at 85% 15%, rgba(255,180,50,0.2) 0%, transparent 50%),
          radial-gradient(ellipse 80% 40% at 50% 50%, rgba(180,40,0,0.15) 0%, transparent 60%),
          linear-gradient(170deg, #0f0800 0%, #130d03 60%, #0a0502 100%);
        background-attachment: fixed;
      }
      button:active { transform: scale(0.97); }
      @keyframes pulse-glow { 0%,100% { opacity:1; } 50% { opacity:0.5; } }
      @keyframes shimmer { 0% { background-position:-200% 0; } 100% { background-position:200% 0; } }
      .shimmer { background: linear-gradient(90deg, #888 25%, #aaa 50%, #888 75%); background-size: 200% 100%; animation: shimmer 1.5s infinite; -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
      .pulse { animation: pulse-glow 2s ease-in-out infinite; }
    </style>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
