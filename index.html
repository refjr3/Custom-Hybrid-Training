<!DOCTYPE html>
<html lang="en">
  <head>
    <link rel="manifest" href="/manifest.json">
<meta name="theme-color" content="#0A0A0A">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black">
<meta name="apple-mobile-web-app-title" content="Training OS">
<link rel="apple-touch-icon" href="/logo192.png">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">

    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Fagundo Training OS</title>
    <style>
      * { -webkit-tap-highlight-color: transparent; }
      body { margin: 0; background: #0A0A0A; font-family: 'Inter',-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif; }
      button:active { transform: scale(0.97); }
      @keyframes pulse-glow { 0%,100% { opacity:1; } 50% { opacity:0.5; } }
      @keyframes shimmer { 0% { background-position:-200% 0; } 100% { background-position:200% 0; } }
      .shimmer { background: linear-gradient(90deg, #888 25%, #aaa 50%, #888 75%); background-size: 200% 100%; animation: shimmer 1.5s infinite; -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
      .pulse { animation: pulse-glow 2s ease-in-out infinite; }
    </style>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
